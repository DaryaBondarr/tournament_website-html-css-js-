<!DOCTYPE html>
<html lang="ru">
<head>

    <header>

        </div>
        
        <nav class="main-nav">
            <ul>
                <li>

                        <img src="images/icons8-главная-48.png" alt="Главная" class="nav-icon">

                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="images/icons8-рейтинг-48.png" alt="Статистика" class="nav-icon">
                        <span>СТАТИСТИКА</span>
                    </a>
                </li>
                <li>
                    <a href="tourney_choiceMap.html">
                        <img src="images/icons8-трофей-48.png" alt="Турниры" class="nav-icon">

                </li>
                <li>
                    <a href="info.html">

                </li>
                <li>
                    <a href="#">

                        <span>ПРОФИЛЬ</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    
    <main>
         <div class="title-stripes">
        <div class="stripe"></div>
        <div class="stripe"></div>
    </div>
    
    <!-- Сам заголовок -->
    <h1 class="map-selection-title">Выберите карту</h1>
            
            <div class="maps-columns">
                <!-- Колонка Ущелье -->
                <div class="map-column">
                    <div class="map-header">
                        <div class="map-icon">
                            <img src="images/ущелье.jpg" alt="Ущелье">
                        </div>
                        <h2 class="map-name">Ущелье</h2>
                    </div>
                    <div class="map-modes">
                        <button class="mode-btn">1х1</button>
                        <button class="mode-btn">2х2</button>
                        <button class="mode-btn">3х3</button>
                        <button class="mode-btn">5х5</button>
                    </div>
                </div>
                
                <!-- Колонка Арам -->
                <div class="map-column">
                    <div class="map-header">
                        <div class="map-icon">
                            <img src="images/арам.png" alt="Арам">
                        </div>
                        <h2 class="map-name">Арам</h2>
                    </div>
                    <div class="map-modes">
                        <button class="mode-btn">1х1</button>
                        <button class="mode-btn">2х2</button>
                        <button class="mode-btn">3х3</button>
                        <button class="mode-btn">5х5</button>
                    </div>
                </div>
                
                <!-- Колонка ТФТ -->
                <div class="map-column">
                    <div class="map-header">
                        <div class="map-icon">
                            <img src="images/тфт.png" alt="ТФТ">
                        </div>
                        <h2 class="map-name">ТФТ</h2>
                    </div>
                    <div class="map-modes">
                        <button class="mode-btn">1х8</button>
                    </div>

                <a href="https://vk.com/xellkart" target="_blank" rel="noopener noreferrer"><img src="images/vk.jpg" alt="VK"></a>
                <a href="#"><img src="images/ds.jpg" alt="Discord"></a>
