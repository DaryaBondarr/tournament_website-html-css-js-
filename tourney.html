<!DOCTYPE html>
<html lang="ru">

        <div class="header-right">

            </div>      
            <div class="search-bar">
                <input type="text" placeholder="Поиск">

            </div>
        </div>
        
        <nav class="main-nav">
            <ul>
                <li>
                    <a href="index.html">
                        <img src="images/icons8-главная-48.png" alt="Главная" class="nav-icon">
                        <span>ГЛАВНАЯ</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="images/icons8-рейтинг-48.png" alt="Статистика" class="nav-icon">
                        <span>СТАТИСТИКА</span>
                    </a>
                </li>
                <li>
                    <a href="tourney.html">

                </li>
                <li>

                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="images/icons8_пользователь_мужчина_в_кружке_48.png" alt="Профиль" class="nav-icon">
                        <span>ПРОФИЛЬ</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="steps-section">

            <div class="steps">
                <div class="step">
                    <img src="images/icons8-надпись-100.png" alt="Шаг 1" class="step-icon">
                    <span class="step-text">1. Регистрируйся</span>
                </div>
                <div class="step">
                    <img src="images/icons8-скрещенные-мечи-100.png" alt="Шаг 2" class="step-icon">
                    <span class="step-text">2. Участвуй в матчах</span>
                </div>
                <div class="step">
                    <img src="images/icons8-лавровый-венок-100.png" alt="Шаг 3" class="step-icon">
                    <span class="step-text">3. Зарабатывай награды</span>
                </div>
            </div>
        </section>
        <button class="cta-button" onclick="window.open('anketa.html', '_blank')">СОЗДАТЬ АНКЕТУ</button>
       <div class="bottom-block">
    <div class="block-content">
        <img src="images/космос.jpg" alt="Иконка" class="block-img">

            <p>Участвуй в событиях</p>
            <p>Забирайся на вершину</p>

        </div>
    </div>
</div>

                <a href="#"><img src="images/ds.jpg" alt="Discord"></a>
